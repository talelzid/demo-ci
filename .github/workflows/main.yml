name: Pipeline Integration Continue - Redmine
# Déclencheur (Trigger) : Le pipeline s'active à chaque push sur la branche main
on:
  push:
    branches: [ main ]
jobs:
  run-redmine-tests:
    # Choix de la machine virtuelle Linux louée chez GitHub
    runs-on: ubuntu-latest
    steps:
      # Étape 1 : Téléchargement du code source depuis votre dépôt vers la VM
      - name: Étape 1 - Récupérer le code source
        uses: actions/checkout@v4

      # Étape 2 : Installation de l'interpréteur Python officiel sur la VM
      - name: Étape 2 - Installer Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Étape 3 : Installation des packages listés dans votre requirements.txt
      - name: Étape 3 - Installer les dépendances (Requirements)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Étape 4 : Exécution de votre test de connexion Redmine en mode invisible
      - name: Étape 4 - Exécuter le test de connexion
        run: |
          pytest tests/test_connexion.py
